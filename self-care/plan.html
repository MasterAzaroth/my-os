<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<title>Plan — LeoOS</title>
<style>
.planner-tabs{display:flex;gap:4px;padding:10px 16px 0;flex-shrink:0}
.planner-tab{flex:1;padding:8px 4px;border-radius:12px;border:none;background:transparent;color:var(--text3);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all 0.2s;font-weight:500;text-align:center}
.planner-tab.active{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.planner-pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 24px}
.planner-pane.active{display:block}
.planner-add-btn{background:var(--accent);border:none;color:var(--bg);width:32px;height:32px;border-radius:50%;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;font-family:var(--sans)}
.routine-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px}
.routine-card:active{background:var(--bg3);transform:scale(0.99)}
.routine-card-icon{width:44px;height:44px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.routine-card-info{flex:1;min-width:0}
.routine-card-name{font-size:14px;font-weight:500;color:var(--text)}
.routine-card-meta{font-size:11px;color:var(--text3);margin-top:3px}
.goal-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.goal-card:active{background:var(--bg3)}
.goal-card-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
.goal-card-freq{font-size:11px;color:var(--text3);margin-bottom:10px}
.goal-dots{display:flex;gap:5px;flex-wrap:wrap}
.goal-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);transition:background 0.2s}
.goal-dot.done{background:var(--accent)}
.exp-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;gap:12px;align-items:flex-start}
.exp-card:active{background:var(--bg3)}
.exp-card-img{width:48px;height:48px;border-radius:10px;background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px}
.exp-card-img img{width:100%;height:100%;object-fit:contain}
.exp-card-info{flex:1;min-width:0}
.exp-card-name{font-size:13px;font-weight:500;color:var(--text)}
.exp-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.exp-progress{margin-top:8px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.exp-progress-fill{height:100%;background:var(--accent);border-radius:2px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:500;color:var(--text);font-family:var(--serif)}
.cal-nav-btn{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{font-size:9px;color:var(--text3);text-align:center;padding-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;cursor:pointer;transition:background 0.15s;position:relative}
.cal-day:active{background:var(--bg3)}
.cal-day.today .cal-day-num{background:var(--accent);color:var(--bg);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:11px;color:var(--text2);line-height:1;margin-bottom:2px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.sched-section{margin-bottom:16px}
.sched-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.sched-session-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px}
.sched-session-card:active{background:var(--bg3);transform:scale(0.99)}
.sched-session-icon{font-size:20px;width:38px;height:38px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sched-session-info{flex:1;min-width:0}
.sched-session-name{font-size:13px;font-weight:500;color:var(--text)}
.sched-session-rule{font-size:11px;color:var(--text3);margin-top:2px}
.sched-session-items{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-change-badge{font-size:9px;padding:2px 6px;border-radius:6px;flex-shrink:0;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.badge-new{background:rgba(74,124,89,0.2);color:#4a7c59}
.badge-edited{background:rgba(200,184,154,0.2);color:var(--accent)}
.badge-deleted{background:rgba(180,60,60,0.15);color:#c45}
.push-bar{position:sticky;bottom:0;background:var(--bg);padding:12px 0 4px;margin-top:8px}
.push-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--serif);letter-spacing:0.04em;display:flex;align-items:center;justify-content:center;gap:8px}
.push-btn:active{opacity:0.85}
.push-btn:disabled{opacity:0.4;cursor:default}
.diff-block{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:0.5px solid var(--border)}
.diff-added{background:rgba(74,124,89,0.08);border-color:rgba(74,124,89,0.3)}
.diff-removed{background:rgba(180,60,60,0.06);border-color:rgba(180,60,60,0.2)}
.diff-edited{background:rgba(200,184,154,0.08);border-color:rgba(200,184,154,0.3)}
.checkin-card{background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:8px}
.checkin-date{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.checkin-notes{font-size:12px;color:var(--text2);line-height:1.5}
/* Subpage slide-in */
.planner-subpage{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:300;display:none;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1)}
.planner-subpage.open{transform:translateX(0);display:flex}
.planner-subpage-header{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-top) + 16px) 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.planner-back-btn{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:12px;font-size:12px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:4px}
.planner-subpage-title{font-family:var(--serif);font-size:18px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.planner-subpage-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
/* Kit flow */
.kit-flow-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:400;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease}
.kit-flow-overlay.open{display:flex}
.kit-flow-overlay.visible{background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)}
.kit-flow-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,20px);position:relative;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
.kit-flow-overlay.visible .kit-flow-sheet{transform:translateY(0)}
.kit-flow-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.kit-flow-title{font-family:var(--serif);font-size:20px;color:var(--text)}
.kit-flow-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:hidden;min-height:0;padding:0 20px 20px}
.kit-flow-body::-webkit-scrollbar{display:none}
.kit-save-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.planner-type-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;cursor:pointer;text-align:left;width:100%;transition:all 0.2s;font-family:var(--sans)}
.planner-type-btn:active{background:var(--bg3)}
.planner-type-icon{font-size:24px;flex-shrink:0}
.planner-type-title{font-size:13px;font-weight:500;color:var(--text)}
.planner-type-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* form overlay */
.kit-flow-footer{padding:12px 20px;border-top:0.5px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <div class="page">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div><div class="page-label">Self Care</div><div class="page-title">Planner</div></div>
      <button class="planner-add-btn" onclick="openPlannerAdd()">+</button>
    </div>
    <div class="planner-tabs">
      <button class="planner-tab active" id="ptab-operator"  onclick="switchPlannerTab('operator')">Operator</button>
      <button class="planner-tab"        id="ptab-scheduler" onclick="switchPlannerTab('scheduler')">Scheduler</button>
      <button class="planner-tab"        id="ptab-goals"     onclick="switchPlannerTab('goals')">Goals</button>
      <button class="planner-tab"        id="ptab-lab"       onclick="switchPlannerTab('lab')">Lab</button>
    </div>
    <div class="planner-pane active" id="pane-operator"><div id="operatorContent"></div></div>
    <div class="planner-pane" id="pane-scheduler"><div id="schedulerContent"></div></div>
    <div class="planner-pane" id="pane-goals"><div id="goalsContent"></div></div>
    <div class="planner-pane" id="pane-lab"><div id="labContent"></div></div>
  </div>

  <!-- Planner subpage -->
  <div class="planner-subpage" id="plannerSubpage">
    <div class="planner-subpage-header">
      <button class="planner-back-btn" onclick="closePlannerSubpage()">‹ Back</button>
      <div class="planner-subpage-title" id="plannerSubpageTitle"></div>
      <div id="plannerSubpageActions"></div>
    </div>
    <div class="planner-subpage-body" id="plannerSubpageBody"></div>
  </div>

  <!-- Add type picker -->
  <div class="kit-flow-overlay" id="plannerAddOverlay" style="z-index:600">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div style="font-family:var(--serif);font-size:20px;color:var(--text)">Add to Planner</div>
        <button onclick="closeOverlay('plannerAddOverlay')" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer">✕</button>
      </div>
      <div class="kit-flow-body" style="padding:16px 20px 20px;display:flex;flex-direction:column;gap:10px">
        <button class="planner-type-btn" onclick="openPlannerForm('routine')"><span class="planner-type-icon">📋</span><div><div class="planner-type-title">Routine</div><div class="planner-type-sub">A reusable list of steps</div></div></button>
        <button class="planner-type-btn" onclick="openPlannerForm('scheduled')"><span class="planner-type-icon">📅</span><div><div class="planner-type-title">Scheduled Treatment</div><div class="planner-type-sub">One-off step on a specific date</div></div></button>
        <button class="planner-type-btn" onclick="openPlannerForm('goal')"><span class="planner-type-icon">🎯</span><div><div class="planner-type-title">Goal</div><div class="planner-type-sub">Track a recurring intention</div></div></button>
        <button class="planner-type-btn" onclick="openPlannerForm('experiment')"><span class="planner-type-icon">🧪</span><div><div class="planner-type-title">Experiment</div><div class="planner-type-sub">Test a product over time</div></div></button>
      </div>
    </div>
  </div>

  <!-- Planner form -->
  <div class="kit-flow-overlay" id="plannerFormOverlay" style="z-index:700">
    <div class="kit-flow-sheet" style="max-height:96vh">
      <div class="kit-flow-header">
        <div id="plannerFormTitle" style="font-family:var(--serif);font-size:20px;color:var(--text)"></div>
        <button onclick="closePlannerForm()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer">✕</button>
      </div>
      <div class="kit-flow-body" id="plannerFormBody" style="padding:16px 20px 20px"></div>
    </div>
  </div>

  <nav class="navbar">
    <button class="nav-btn" onclick="location.href='index.html'"><span class="nav-icon">🪞</span><span class="nav-label">Routine</span></button>
    <button class="nav-btn" onclick="location.href='library.html'"><span class="nav-icon">◈</span><span class="nav-label">Library</span></button>
    <button class="nav-btn nav-hub" onclick="goHub()"><span class="nav-icon">Self Care</span><span class="nav-label">tap for hub</span></button>
    <button class="nav-btn" onclick="location.href='kit.html'"><span class="nav-icon">🧴</span><span class="nav-label">Kit</span></button>
    <button class="nav-btn active" onclick="location.href='plan.html'"><span class="nav-icon">📋</span><span class="nav-label">Plan</span></button>
  </nav>
  <div class="toast" id="toast"></div>
</div>
<script src="../js/core.js"></script>
<script src="../js/plan.js"></script>
<script>
let plannerData = { routines:[], scheduled:[], goals:[], experiments:[] };
let plannerActiveTab = 'operator';
let plannerProducts = [];
let plannerFormType = null;
let calMonth = new Date().getMonth();
let calYear  = new Date().getFullYear();
let scheduleData = { scheduleId:null, liveSessions:[], draftSessions:[] };
const selectedWeekdays = new Set();

(async function init() {
  await initPlanner();
})();
</script>
</body>
</html>
