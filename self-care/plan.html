<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<title>Plan — LeoOS</title>
<style>
.plan-tabs{display:flex;gap:4px;padding:10px 16px 0;flex-shrink:0}
.plan-tab{flex:1;padding:8px 4px;border-radius:12px;border:none;background:transparent;color:var(--text3);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all 0.2s;font-weight:500;text-align:center}
.plan-tab.active{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.plan-pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 24px;min-height:0}
.plan-pane.active{display:block}
.plan-add-btn{background:var(--accent);border:none;color:var(--bg);width:32px;height:32px;border-radius:50%;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--sans)}

/* STEPS LIBRARY */
.lib-filter-row{display:flex;gap:6px;padding:0 0 14px;margin:0;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.lib-filter-row::-webkit-scrollbar{display:none}
.step-bp-section{margin-bottom:18px}
.step-bp-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.step-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
.step-row:active{background:var(--bg3)}
.step-row-info{flex:1;min-width:0}
.step-row-name{font-size:13px;color:var(--text);font-weight:500}
.step-row-product{font-size:11px;color:var(--accent);margin-top:2px}
.step-row-noproduct{color:var(--text3)}
.step-row-chevron{color:var(--text3);font-size:15px;flex-shrink:0}

/* ROUTINES */
.routine-multiselect-btn{background:var(--bg2);border:0.5px solid var(--border2);color:var(--text3);font-size:11px;padding:0 12px;height:32px;border-radius:16px;cursor:pointer;font-family:var(--sans);transition:all 0.2s;flex-shrink:0}
.routine-multiselect-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.routine-card{display:flex;align-items:center;gap:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.routine-card:active{background:var(--bg3);transform:scale(0.99)}
.routine-card-selected{border-color:var(--accent);background:rgba(200,184,154,0.06)}
.routine-select-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--bg);transition:all 0.2s}
.routine-select-check.checked{background:var(--accent);border-color:var(--accent)}
.routine-card-icon{font-size:22px;width:40px;height:40px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.routine-card-info{flex:1;min-width:0}
.routine-card-name{font-size:14px;font-weight:500;color:var(--text)}
.routine-card-meta{font-size:11px;color:var(--text3);margin-top:3px}
.routine-card-badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.routine-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:3px 8px;border-radius:8px;white-space:nowrap}
.routine-badge-live{background:rgba(74,124,89,0.2);color:#4a7c59}
.routine-badge-inactive{background:rgba(100,100,100,0.18);color:var(--text3)}
.routine-type-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.routine-type-recurring{background:rgba(200,184,154,0.15);color:var(--accent)}
.routine-type-occasional{background:rgba(120,140,180,0.18);color:#8aa0c8}
.routine-push-bar{display:none;gap:8px;padding:10px 0 4px;position:sticky;bottom:0;background:var(--bg)}
.routine-push-btn{flex:1;padding:13px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.routine-push-btn:disabled{opacity:0.35;cursor:default}
.routine-uncommit-btn{flex:1;padding:13px;border-radius:14px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.routine-uncommit-btn:disabled{opacity:0.35;cursor:default}

/* ROUTINE BUILDER — picked steps */
.picked-step-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;margin-bottom:6px}
.picked-step-order{font-size:11px;color:var(--text3);width:16px;flex-shrink:0}
.picked-step-name{font-size:13px;color:var(--text);flex:1;min-width:0}
.picked-step-bp{font-size:10px;color:var(--text3);flex-shrink:0}
.picked-step-remove{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0}

/* SCHEDULE */
.schedule-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.schedule-live-count{font-size:11px;color:var(--text3)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:500;color:var(--text);font-family:var(--serif)}
.cal-nav-btn{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{font-size:9px;color:var(--text3);text-align:center;padding-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;cursor:pointer;transition:background 0.15s;position:relative}
.cal-day:active{background:var(--bg3)}
.cal-day.today .cal-day-num{background:var(--accent);color:var(--bg);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-day.other-month{cursor:default}
.cal-day-num{font-size:11px;color:var(--text2);line-height:1;margin-bottom:2px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.sched-session-card{display:flex;align-items:center;gap:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}
.sched-session-icon{font-size:20px;width:38px;height:38px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sched-session-info{flex:1;min-width:0}
.sched-session-name{font-size:13px;font-weight:500;color:var(--text)}
.sched-session-rule{font-size:11px;color:var(--text3);margin-top:2px}

/* Subpage slide-in */
.planner-subpage{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:300;display:none;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1)}
.planner-subpage.open{transform:translateX(0);display:flex}
.planner-subpage-header{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-top) + 16px) 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.planner-back-btn{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:12px;font-size:12px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:4px}
.planner-subpage-title{font-family:var(--serif);font-size:18px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.planner-subpage-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* Detail stats (reused style) */
.detail-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.detail-stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.detail-stat-val{font-size:13px;color:var(--text2)}

/* Overlay sheets — shared form pattern */
.kit-flow-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:400;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease}
.kit-flow-overlay.open{display:flex}
.kit-flow-overlay.visible{background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)}
.kit-flow-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,20px);position:relative;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
.kit-flow-overlay.visible .kit-flow-sheet{transform:translateY(0)}
.kit-flow-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.kit-flow-title{font-family:var(--serif);font-size:20px;color:var(--text)}
.kit-flow-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:hidden;min-height:0;padding:16px 20px 20px}
.kit-flow-body::-webkit-scrollbar{display:none}
.kit-flow-footer{padding:12px 20px;border-top:0.5px solid var(--border)}
.kit-save-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans)}

/* PRODUCT PICKER (multi-select, Library-style cards) */
.picker-search-wrap{padding:0 0 12px}
.picker-search-inner{display:flex;align-items:center;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:0 14px;gap:10px}
.picker-search-icon{font-size:16px;color:var(--text3)}
.picker-search{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;padding:10px 0;font-family:var(--sans)}
.picker-search::placeholder{color:var(--text3)}
.picker-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.picker-card{position:relative;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s}
.picker-card:active{transform:scale(0.97);background:var(--bg3)}
.picker-card-selected{border-color:var(--accent)}
.picker-card-cover{width:100%;aspect-ratio:1/1;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.picker-card-cover img{width:100%;height:100%;object-fit:contain}
.picker-card-placeholder{font-size:32px;color:var(--text3)}
.picker-card-check{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.picker-card-info{padding:6px 8px 8px}
.picker-card-name{font-size:10px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-card-brand{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-done-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}

/* GENERIC ACTION BUTTON (used by step/routine detail pages) */
.form-next-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.form-next-btn:active{opacity:0.85}
.form-next-btn.secondary{background:transparent;border:0.5px solid var(--border2);color:var(--text2)}

/* STEP DETAIL PAGE */
.step-detail-hero{margin-bottom:24px}
.step-detail-bp-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:8px}
.step-detail-tag{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:8px 16px}
.step-detail-tag-icon{font-size:16px}
.step-detail-tag-text{font-size:13px;font-weight:500;color:var(--text)}
.plan-section-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:10px}
.linked-product-card{display:flex;align-items:center;gap:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.linked-product-card:active{background:var(--bg3);transform:scale(0.99)}
.linked-product-thumb{width:46px;height:46px;border-radius:10px;background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px}
.linked-product-thumb img{width:100%;height:100%;object-fit:contain}
.linked-product-info{flex:1;min-width:0}
.linked-product-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linked-product-brand{font-size:11px;color:var(--text3);margin-top:2px}
.linked-product-chevron{color:var(--text3);font-size:16px;flex-shrink:0}
.plan-detail-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.plan-action-btn{width:100%;padding:14px;border-radius:14px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.plan-action-btn:active{background:var(--bg3)}
.plan-action-danger{color:#c45;border-color:rgba(180,60,60,0.3)}

/* LIGHTWEIGHT PRODUCT PREVIEW (inline, read-only) */
.preview-hero{display:flex;gap:14px;margin-bottom:20px}
.preview-hero-img{width:90px;height:90px;flex-shrink:0;border-radius:12px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center}
.preview-hero-img img{width:100%;height:100%;object-fit:contain}
.preview-hero-placeholder{font-size:32px;color:var(--text3)}
.preview-hero-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}
.preview-hero-category{font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.preview-hero-name{font-family:var(--serif);font-size:18px;color:var(--text);line-height:1.2}
.preview-hero-brand{font-size:12px;color:var(--text2)}
.preview-hero-rating{font-size:12px;color:var(--accent);margin-top:2px}
.preview-section{margin-bottom:16px}
.preview-section-title{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.preview-text{font-size:13px;color:var(--text2);line-height:1.6}
.preview-price-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;margin-bottom:6px}
.preview-price-source{font-size:12px;color:var(--text2)}
.preview-price-val{font-size:13px;color:var(--accent);font-weight:500}
.preview-open-library-btn{width:100%;padding:13px;border-radius:14px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);margin-top:6px}
</style>
</head>
<body>
<div class="app">
  <div class="page">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div><div class="page-label">Self Care</div><div class="page-title">Plan</div></div>
      <button class="plan-add-btn" id="planAddBtn" onclick="handlePlanAdd()">+</button>
    </div>
    <div class="plan-tabs">
      <button class="plan-tab active" data-tab="steps" onclick="switchPlanTab('steps')">Steps</button>
      <button class="plan-tab" data-tab="routines" onclick="switchPlanTab('routines')">Routines</button>
      <button class="plan-tab" data-tab="schedule" onclick="switchPlanTab('schedule')">Schedule</button>
    </div>

    <!-- STEPS PANE -->
    <div class="plan-pane active" id="planPane-steps">
      <div class="lib-filter-row" id="stepsBodyPartFilter"></div>
      <div id="stepsLibraryList"></div>
    </div>

    <!-- ROUTINES PANE -->
    <div class="plan-pane" id="planPane-routines">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="routine-multiselect-btn" id="routineMultiSelectBtn" onclick="toggleRoutineMultiSelect()">Select</button>
      </div>
      <div id="routinesList"></div>
      <div class="routine-push-bar" id="routinePushBar">
        <button class="routine-uncommit-btn" id="routineUncommitBtn" onclick="uncommitSelectedRoutines()" disabled>Uncommit</button>
        <button class="routine-push-btn" id="routinePushBtn" onclick="pushSelectedRoutines()" disabled>Push</button>
      </div>
    </div>

    <!-- SCHEDULE PANE -->
    <div class="plan-pane" id="planPane-schedule">
      <div class="schedule-header-row">
        <div class="schedule-live-count" id="scheduleLiveCount"></div>
      </div>
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="shiftScheduleCalMonth(-1)">‹</button>
        <div class="cal-month-label" id="scheduleCalLabel"></div>
        <button class="cal-nav-btn" onclick="shiftScheduleCalMonth(1)">›</button>
      </div>
      <div class="cal-grid" style="margin-bottom:4px">
        <div class="cal-day-label">S</div><div class="cal-day-label">M</div><div class="cal-day-label">T</div>
        <div class="cal-day-label">W</div><div class="cal-day-label">T</div><div class="cal-day-label">F</div><div class="cal-day-label">S</div>
      </div>
      <div class="cal-grid" id="scheduleCalGrid"></div>
    </div>
  </div>

  <!-- Plan subpage (step detail / routine detail / day detail) -->
  <div class="planner-subpage" id="planSubpage">
    <div class="planner-subpage-header">
      <button class="planner-back-btn" onclick="closePlanSubpage()">‹ Back</button>
      <div class="planner-subpage-title" id="planSubpageTitle"></div>
    </div>
    <div class="planner-subpage-body" id="planSubpageBody"></div>
  </div>

  <!-- STEP FORM -->
  <div class="kit-flow-overlay" id="stepFormOverlay">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div class="kit-flow-title" id="stepFormTitle">New Step</div>
        <button onclick="closeStepForm()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer">✕</button>
      </div>
      <div class="kit-flow-body" id="stepFormBody"></div>
      <div class="kit-flow-footer"><button class="kit-save-btn" onclick="saveStep()">Save Step</button></div>
    </div>
  </div>

  <!-- PRODUCT PICKER (multi-select bottom sheet) -->
  <div class="kit-flow-overlay" id="productPickerOverlay" style="z-index:550">
    <div class="kit-flow-sheet" style="max-height:92vh">
      <div class="kit-flow-header">
        <div class="kit-flow-title">Link Products</div>
        <button onclick="closeProductPicker()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer">✕</button>
      </div>
      <div class="kit-flow-body">
        <div class="picker-search-wrap">
          <div class="picker-search-inner">
            <span class="picker-search-icon">⌕</span>
            <input class="picker-search" id="productPickerSearch" placeholder="Search products..." oninput="renderProductPickerList(this.value)">
          </div>
        </div>
        <div class="picker-grid" id="productPickerGrid"></div>
      </div>
      <div class="kit-flow-footer"><button class="picker-done-btn" onclick="closeProductPicker()">Done</button></div>
    </div>
  </div>

  <!-- ROUTINE BUILDER -->
  <div class="kit-flow-overlay" id="routineBuilderOverlay" style="z-index:450">
    <div class="kit-flow-sheet" style="max-height:96vh">
      <div class="kit-flow-header">
        <div class="kit-flow-title" id="routineBuilderTitle">New Routine</div>
        <button onclick="closeRoutineBuilder()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer">✕</button>
      </div>
      <div class="kit-flow-body" id="routineBuilderBody"></div>
      <div class="kit-flow-footer"><button class="kit-save-btn" onclick="commitRoutine()">Commit</button></div>
    </div>
  </div>

  <!-- STEP PICKER FOR ROUTINE -->
  <div class="kit-flow-overlay" id="stepPickerForRoutineOverlay" style="z-index:500">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div class="kit-flow-title">Add Step</div>
