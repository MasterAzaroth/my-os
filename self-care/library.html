<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<title>Library — LeoOS</title>
<style>
/* LIBRARY */
.lib-search-wrap{padding:10px 20px;flex-shrink:0}
.lib-search-inner{display:flex;align-items:center;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:0 14px;gap:10px}
.lib-search-icon{font-size:16px;color:var(--text3)}
.lib-search{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;padding:10px 0;font-family:var(--sans)}
.lib-search::placeholder{color:var(--text3)}
.lib-lists{display:flex;align-items:center;gap:6px;padding:4px 14px 10px 20px;flex-shrink:0}
.lib-lists-inner{display:flex;gap:6px;overflow-x:auto;overflow-y:visible;flex:1;-webkit-overflow-scrolling:touch;padding:2px 0}
.lib-lists-inner::-webkit-scrollbar{display:none}
.lib-sort-pill{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;padding:0 12px;height:28px;border-radius:16px;border:0.5px solid var(--accent);background:var(--accent);cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.lib-sort-pill:active{opacity:0.8}
.lib-list-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:0 12px;height:28px;border-radius:16px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans);white-space:nowrap}
.lib-list-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.lib-filter-row{display:flex;gap:6px;padding:0 20px 8px;overflow-x:auto;flex-shrink:0}
.lib-filter-row::-webkit-scrollbar{display:none}
.lib-filter-btn{flex-shrink:0;padding:5px 12px;border-radius:16px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.lib-filter-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.lib-sort-select{background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);font-size:11px;padding:4px 8px;border-radius:8px;outline:none;font-family:var(--sans);cursor:pointer}
.lib-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:4px 12px 20px}
.lib-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative}
.lib-card:active{transform:scale(0.97);background:var(--bg3)}
.lib-card-cover{width:100%;aspect-ratio:1/1;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.lib-card-cover img{width:100%;height:100%;object-fit:contain;object-position:center}
.lib-card-cover-placeholder{font-size:36px;color:var(--text3)}
.lib-card-status{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
.lib-card-rating{position:absolute;bottom:8px;left:8px;background:rgba(8,8,8,0.85);padding:2px 7px;border-radius:10px;font-size:11px;color:var(--accent);font-weight:500;backdrop-filter:blur(4px)}
.lib-card-lists{position:absolute;bottom:8px;right:8px;display:flex;gap:3px}
.lib-card-info{padding:6px 8px 8px}
.lib-card-name{font-size:10px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.lib-card-brand{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-card-price-row{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap}
.lib-card-price{font-size:10px;color:var(--text2);font-weight:500}
.lib-card-link{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.stock-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.stock-full{background:var(--green)}.stock-low{background:var(--yellow)}.stock-empty{background:var(--red)}
/* compare */
.lib-card.compare-selected{border-color:var(--accent);background:rgba(200,184,154,0.05)}
.compare-select-hint{font-size:12px;color:var(--text3);padding:8px 20px 4px;text-align:center}
/* add product btn */
.add-product-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:var(--bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;line-height:1;flex-shrink:0;transition:all 0.2s}
.add-product-btn:active{transform:scale(0.93)}
.scan-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
/* DETAIL OVERLAY */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease}
.detail-overlay.open{display:flex}
.detail-overlay.visible{background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)}
.detail-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;position:relative;padding-bottom:env(safe-area-inset-bottom,20px);transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
.detail-overlay.visible .detail-sheet{transform:translateY(0)}
.detail-sheet::-webkit-scrollbar{display:none}
.detail-hero{display:flex;gap:14px;padding:56px 16px 20px;border-bottom:0.5px solid var(--border)}
.detail-hero-img{width:155px;height:155px;flex-shrink:0;border-radius:12px;background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center}
.detail-hero-img img{width:100%;height:100%;object-fit:contain}
.detail-hero-img-placeholder{font-size:40px;color:var(--text3)}
.detail-hero-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}
.detail-hero-category{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.detail-hero-name{font-family:var(--serif);font-size:20px;color:var(--text);line-height:1.15}
.detail-hero-brand{font-size:13px;color:var(--text2)}
.detail-hero-star{font-size:24px;width:32px;text-align:center;color:var(--border2);cursor:pointer;transition:color 0.1s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;pointer-events:all;display:inline-block;padding:4px 2px}
.detail-hero-star.filled{color:var(--accent)}
.detail-rating-row-full{display:flex;align-items:center;gap:1px;padding:10px 16px 14px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;max-width:calc(5 * 32px)}
.detail-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;font-family:var(--sans)}
.detail-actions{position:absolute;top:16px;left:16px;display:flex;gap:6px;z-index:10}
.detail-action-btn{background:rgba(8,8,8,0.7);border:0.5px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:var(--sans);backdrop-filter:blur(4px);transition:all 0.2s}
.detail-action-btn:active{background:var(--bg2)}
.detail-delete-btn{color:var(--red)!important}
.detail-body{padding:20px}
.detail-body-pad{padding:16px 20px 20px}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.detail-text{font-size:13px;color:var(--text2);line-height:1.6}
.detail-notes{font-size:13px;color:var(--text2);line-height:1.6;font-style:italic}
.notes-placeholder{color:var(--text3);font-style:italic}
.detail-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.detail-stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.detail-stat-val{font-size:13px;color:var(--text2)}
.detail-lists-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.detail-list-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:12px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.detail-list-chip.in-list{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.detail-prices{display:flex;flex-direction:column;gap:8px}
.detail-price-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px}
.detail-price-source{font-size:12px;color:var(--text2)}
.detail-price-val{font-size:13px;color:var(--accent);font-weight:500}
.detail-price-link{font-size:10px;color:var(--text3);text-decoration:none;margin-top:2px;display:block}
.detail-rating-inline{display:flex;align-items:center;flex-wrap:wrap;gap:2px}
.detail-star-inline{font-size:20px;color:var(--border2);cursor:pointer;transition:color 0.1s}
.detail-star-inline.filled{color:var(--accent)}
.detail-notes-edit{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text2);font-size:13px;outline:none;font-family:var(--sans);resize:none;min-height:80px;line-height:1.5;transition:border-color 0.2s}
.detail-notes-edit:focus{border-color:var(--border2)}
.detail-routine-steps{display:flex;flex-wrap:wrap;gap:6px}
.routine-step-chip{padding:5px 10px;border-radius:12px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.routine-step-chip.linked{background:var(--bg3);color:var(--accent);border-color:var(--accent2)}
.add-to-kit-btn{width:100%;padding:13px;border-radius:12px;border:0.5px solid var(--accent2);background:transparent;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.2s;text-align:center}
.kit-instance-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.kit-instance-state{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;margin-bottom:8px}
.state-active{background:rgba(74,124,89,0.2);color:#4a7c59}
.state-backup{background:rgba(74,74,138,0.2);color:#4a4a8a}
.state-passive{background:rgba(100,100,100,0.2);color:#888}
.kit-amount-bar{height:4px;background:var(--border);border-radius:2px;margin:6px 0;overflow:hidden}
.kit-amount-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.4s}
.expiry-row{display:flex;gap:8px;margin-top:6px}
.expiry-metric{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;text-align:center}
.expiry-val{font-size:15px;font-weight:500;color:var(--accent)}
.expiry-label{font-size:10px;color:var(--text3);margin-top:2px}
/* FORM OVERLAY */
.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:300;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease}
.form-overlay.open{display:flex}
.form-overlay.visible{background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)}
.form-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:94vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,20px);transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
.form-overlay.visible .form-sheet{transform:translateY(0)}
.form-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.form-back{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:var(--sans)}
.form-close{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--sans)}
.form-step-indicator{display:flex;gap:4px}
.form-step-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);transition:all 0.2s}
.form-step-dot.active{background:var(--accent);width:16px;border-radius:3px}
.form-title-row{padding:16px 20px 12px}
.form-step-label{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.form-step-title{font-family:var(--serif);font-size:22px;color:var(--text)}
.form-body{flex:1;overflow-y:auto;padding:0 20px;-webkit-overflow-scrolling:touch}
.form-body::-webkit-scrollbar{display:none}
.form-footer{padding:16px 20px 4px;flex-shrink:0}
.form-next-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.form-next-btn.secondary{background:transparent;border:0.5px solid var(--border2);color:var(--text3)}
/* KIT FLOW */
.kit-flow-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:400;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease}
.kit-flow-overlay.open{display:flex}
.kit-flow-overlay.visible{background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)}
.kit-flow-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,20px);position:relative;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
.kit-flow-overlay.visible .kit-flow-sheet{transform:translateY(0)}
.kit-flow-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.kit-flow-title{font-family:var(--serif);font-size:20px;color:var(--text)}
.kit-flow-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:hidden;min-height:0;padding:0 20px 20px}
.kit-flow-body::-webkit-scrollbar{display:none}
.kit-flow-footer{padding:12px 20px;border-top:0.5px solid var(--border)}
.kit-save-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.amount-display{text-align:center;margin:12px 0 4px}
.amount-big{font-size:32px;font-weight:500;color:var(--text)}
.amount-total{font-size:14px;color:var(--text3)}
.amount-visual{position:relative;height:48px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin:10px 0;cursor:pointer}
.amount-fill-vis{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:12px;transition:width 0.1s}
.amount-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text);font-weight:500;pointer-events:none}
.kit-session-btn{flex:1;padding:10px 14px;border-radius:12px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.kit-session-btn.kit-session-active{border-color:var(--accent2);color:var(--accent)}
.kit-step-count{background:var(--accent);color:var(--bg);font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.planner-type-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;cursor:pointer;text-align:left;width:100%;transition:all 0.2s;font-family:var(--sans)}
.planner-type-btn:active{background:var(--bg3)}
.planner-type-icon{font-size:24px;flex-shrink:0}
.planner-type-title{font-size:13px;font-weight:500;color:var(--text)}
.planner-type-sub{font-size:11px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="page">
    <div class="page-header" style="padding-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div><div class="page-label">Self Care</div><div class="page-title">Library</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="scan-btn" onclick="toggleCompareMode()" id="compareToggle" style="font-size:12px;font-family:var(--sans);width:auto;padding:0 10px;border-radius:20px">Compare</button>
        <button class="scan-btn" onclick="openBarcodeScanner()" title="Scan barcode">⌻</button>
        <button class="add-product-btn" onclick="openProductForm()">+</button>
      </div>
    </div>
    <div class="lib-search-wrap">
      <div class="lib-search-inner">
        <span class="lib-search-icon">⌕</span>
        <input class="lib-search" id="libSearch" placeholder="Search products..." oninput="filterLibrary()">
      </div>
    </div>
    <div class="lib-lists">
      <div class="lib-lists-inner" id="libLists"></div>
      <button class="lib-sort-pill" onclick="openLibSortMenu()">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M3 7h8M5 11h4" stroke="var(--bg)" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <select class="lib-sort-select" id="libSort" onchange="filterLibrary()" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px">
        <option value="name">Name</option><option value="brand">Brand</option><option value="rating">Rating</option><option value="newest">Newest</option>
      </select>
    </div>
    <div class="lib-filter-row" id="libFilterRow"></div>
    <div class="ptr-wrap" id="libPtrWrap">
      <div class="ptr-indicator"><div class="ptr-spinner" id="libSpinner"><div class="ptr-spinner-ring"></div></div></div>
      <div class="scroll" id="libScroll">
        <div class="lib-grid" id="libGrid">
          <div style="grid-column:span 3" class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PRODUCT DETAIL OVERLAY -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-sheet" id="detailSheet">
      <div class="detail-actions">
        <button class="detail-action-btn" onclick="editProduct()">Edit</button>
        <button class="detail-action-btn detail-delete-btn" onclick="deleteProduct()">Delete</button>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <!-- ADD PRODUCT FORM -->
  <div class="form-overlay" id="formOverlay">
    <div class="form-sheet">
      <div class="form-header">
        <button class="form-back" id="formBack" onclick="formPrev()">←</button>
        <div class="form-step-indicator" id="formStepIndicator"></div>
        <button class="form-close" onclick="closeProductForm()">✕</button>
      </div>
      <div class="form-title-row">
        <div class="form-step-label" id="formStepLabel"></div>
        <div class="form-step-title" id="formStepTitle"></div>
      </div>
      <div class="form-body" id="formBody"></div>
      <div class="form-footer"><button class="form-next-btn" id="formNextBtn" onclick="formNext()">Continue</button></div>
    </div>
  </div>

  <!-- COMPARE OVERLAY -->
  <div class="form-overlay" id="compareOverlay">
    <div class="form-sheet" style="max-height:96vh">
      <div class="form-header">
        <div style="font-size:13px;color:var(--text2);font-weight:500">Compare Products</div>
        <button class="form-close" onclick="closeCompare()">✕</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px 20px" id="compareBody"></div>
    </div>
  </div>

  <!-- BARCODE SCANNER -->
  <div id="barcodeOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(0px);transition:background 0.35s ease,backdrop-filter 0.35s ease">
    <div id="barcodeSheet" style="background:#000;border-radius:24px 24px 0 0;width:100%;height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);overflow:hidden">
      <video id="barcodeVideo" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" playsinline muted></video>
      <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;padding:0 30px">
        <div style="width:100%;max-width:300px;height:130px;position:relative;margin-bottom:20px">
          <div style="position:absolute;inset:0;border:2px solid var(--accent);border-radius:12px;opacity:0.9"></div>
          <div style="position:absolute;top:-1px;left:-1px;width:24px;height:24px;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:10px 0 0 0"></div>
          <div style="position:absolute;top:-1px;right:-1px;width:24px;height:24px;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 10px 0 0"></div>
          <div style="position:absolute;bottom:-1px;left:-1px;width:24px;height:24px;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 10px"></div>
          <div style="position:absolute;bottom:-1px;right:-1px;width:24px;height:24px;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 10px 0"></div>
          <div id="scanLine" style="position:absolute;top:0;left:4px;right:4px;height:2px;background:var(--accent);border-radius:2px;opacity:0.8;animation:scanAnim 2s ease-in-out infinite"></div>
        </div>
        <div id="barcodeStatus" style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:24px;text-align:center">Point camera at barcode</div>
        <div id="manualWrap" style="width:100%;max-width:300px;display:none;flex-direction:column;gap:8px">
          <div style="display:flex;gap:8px">
            <input id="manualBarcodeInput" style="flex:1;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;font-family:var(--sans)" placeholder="Enter barcode number..." type="number">
            <button onclick="submitManualBarcode()" style="background:var(--accent);border:none;color:var(--bg);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap">Look up</button>
          </div>
        </div>
        <button onclick="toggleManualEntry()" id="manualToggleBtn" style="font-size:12px;color:rgba(255,255,255,0.4);background:transparent;border:none;padding:8px;cursor:pointer;font-family:var(--sans)">Enter barcode manually</button>
      </div>
      <button onclick="closeBarcodeScanner()" style="position:absolute;top:calc(20px + env(safe-area-inset-top,0px));right:20px;background:rgba(30,30,30,0.8);border:0.5px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;z-index:3;backdrop-filter:blur(4px)">✕</button>
    </div>
  </div>

  <!-- ADD TO KIT FLOW -->
  <div class="kit-flow-overlay" id="kitFlowOverlay">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div class="kit-flow-title">Add to My Kit</div>
        <button onclick="closeKitFlow()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer;font-family:var(--sans)">✕</button>
      </div>
      <div class="kit-flow-body" id="kitFlowBody"></div>
      <div class="kit-flow-footer"><button class="kit-save-btn" onclick="saveKitItem()">Add to Kit</button></div>
    </div>
  </div>

  <!-- PURCHASE SOURCE -->
  <div class="kit-flow-overlay" id="purchaseOverlay" style="z-index:600">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div style="font-family:var(--serif);font-size:20px;color:var(--text)">Where did you buy it?</div>
        <button onclick="closePurchaseOverlay()" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text3);width:30px;height:30px;border-radius:50%;font-size:12px;cursor:pointer;font-family:var(--sans)">✕</button>
      </div>
      <div class="kit-flow-body" id="purchaseBody" style="padding:16px 20px 20px"></div>
    </div>
  </div>

  <!-- STEP PICKER -->
  <div class="kit-flow-overlay" id="stepPickerOverlay" style="z-index:500">
    <div class="kit-flow-sheet">
      <div class="kit-flow-header">
        <div id="stepPickerTitle" style="font-family:var(--serif);font-size:20px;color:var(--text)"></div>
        <button onclick="closeStepPicker()" class="form-close">✕</button>
      </div>
      <div class="kit-flow-body" id="stepPickerList" style="padding:16px 20px 20px"></div>
    </div>
  </div>

  <nav class="navbar">
    <button class="nav-btn" onclick="location.href='index.html'"><span class="nav-icon">🪞</span><span class="nav-label">Routine</span></button>
    <button class="nav-btn active" onclick="location.href='library.html'"><span class="nav-icon">◈</span><span class="nav-label">Library</span></button>
    <button class="nav-btn nav-hub" onclick="goHub()"><span class="nav-icon">Self Care</span><span class="nav-label">tap for hub</span></button>
    <button class="nav-btn" onclick="location.href='kit.html'"><span class="nav-icon">🧴</span><span class="nav-label">Kit</span></button>
    <button class="nav-btn" onclick="location.href='plan.html'"><span class="nav-icon">📋</span><span class="nav-label">Plan</span></button>
  </nav>
  <div class="toast" id="toast"></div>
</div>
<script src="../js/core.js"></script>
<script src="../js/library.js"></script>

function openLibSortMenu() { document.getElementById('libSort').click(); }

(async function init() {
  await initLibrary();
  setupPTR('libPtrWrap','libScroll','libSpinner', async () => {
    allProducts=[]; allLists=[]; productListMembership={};
    await initLibrary();
  });
})();
</script>
</body>
</html>
