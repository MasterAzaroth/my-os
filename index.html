<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My OS">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>My OS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#0e0e0e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8e8;overflow:hidden}
  .screen{height:100vh;height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px)}
  .header{padding:24px 24px 16px;border-bottom:0.5px solid #1e1e1e}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .app-label{font-size:11px;color:#444;letter-spacing:0.1em;text-transform:uppercase}
  .date{font-size:13px;color:#444}
  .title{font-size:22px;font-weight:600;color:#e8e8e8}
  .progress-wrap{padding:16px 24px;border-bottom:0.5px solid #1a1a1a}
  .progress-meta{display:flex;justify-content:space-between;margin-bottom:8px}
  .progress-label{font-size:11px;color:#555}
  .progress-count{font-size:11px;color:#777;font-weight:500}
  .progress-track{height:2px;background:#1e1e1e;border-radius:2px}
  .progress-fill{height:100%;border-radius:2px;background:#e8e8e8;transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}
  .list{flex:1;overflow-y:auto;padding:8px 0}
  .list::-webkit-scrollbar{display:none}
  .item{display:flex;align-items:center;padding:14px 24px;gap:14px;border-bottom:0.5px solid #141414;transition:opacity 0.2s;cursor:pointer;-webkit-user-select:none;user-select:none}
  .item:active{background:#141414}
  .item.checked{opacity:0.3}
  .check{width:22px;height:22px;border-radius:50%;border:1.5px solid #2e2e2e;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .item.checked .check{background:#e8e8e8;border-color:#e8e8e8}
  .checkmark{display:none;width:6px;height:10px;border:1.5px solid #0e0e0e;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
  .item.checked .checkmark{display:block}
  .item-name{flex:1;font-size:15px;color:#c8c8c8;line-height:1.3}
  .item.checked .item-name{text-decoration:line-through;color:#333}
  .done-screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:40px}
  .done-icon{font-size:48px;margin-bottom:20px}
  .done-title{font-size:20px;font-weight:600;color:#e8e8e8;margin-bottom:8px;text-align:center}
  .done-sub{font-size:14px;color:#555;text-align:center}
  .reset-btn{margin-top:32px;padding:12px 28px;border-radius:24px;border:0.5px solid #2a2a2a;background:transparent;color:#555;font-size:13px;cursor:pointer;transition:all 0.2s}
  .reset-btn:active{background:#1a1a1a;color:#888}
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="header-top">
      <span class="app-label">my os</span>
      <span class="date" id="dateEl"></span>
    </div>
    <div class="title">Test Checklist</div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="progress-label">progress</span>
      <span class="progress-count" id="countEl">0 / 5</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="list" id="list"></div>

  <div class="done-screen" id="doneScreen">
    <div class="done-icon">✦</div>
    <div class="done-title">All done.</div>
    <div class="done-sub">Everything checked off.</div>
    <button class="reset-btn" onclick="reset()">start over</button>
  </div>
</div>

<script>
const ITEMS = [
  "Drink a glass of water",
  "5 minutes of stretching",
  "Review today's goals",
  "Take vitamins",
  "Gratitude — one thing"
];

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let checked = new Array(ITEMS.length).fill(false);

function setDate(){
  const n = new Date();
  document.getElementById("dateEl").textContent = DAYS[n.getDay()] + ", " + MONTHS[n.getMonth()] + " " + n.getDate();
}

function render(){
  const total = ITEMS.length;
  const done = checked.filter(Boolean).length;
  const pct = Math.round((done/total)*100);

  document.getElementById("countEl").textContent = done + " / " + total;
  document.getElementById("progressFill").style.width = pct + "%";

  if(done === total){
    document.getElementById("list").style.display = "none";
    document.getElementById("progressWrap").style.display = "none";
    const ds = document.getElementById("doneScreen");
    ds.style.display = "flex";
    ds.style.flexDirection = "column";
    return;
  }

  document.getElementById("doneScreen").style.display = "none";
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("list").style.display = "block";

  document.getElementById("list").innerHTML = ITEMS.map((name, i) =>
    `<div class="item${checked[i]?' checked':''}" onclick="toggle(${i})">
      <div class="check"><div class="checkmark"></div></div>
      <span class="item-name">${name}</span>
    </div>`
  ).join("");
}

function toggle(i){
  checked[i] = !checked[i];
  render();
}

function reset(){
  checked = new Array(ITEMS.length).fill(false);
  render();
}

setDate();
render();
</script>
</body>
</html>
