<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LeoOS">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<title>LeoOS</title>
<style>
/* ── HOME HUB ONLY ── */
.home-hero{padding:32px 20px 22px}
.home-sysbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.home-sys-id{font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:var(--text3);font-weight:700}
.home-sys-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.home-greeting{font-size:11px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.home-date{font-family:var(--serif);font-size:44px;color:var(--text);line-height:0.9;margin-bottom:12px}
.home-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.home-meta-sep{color:var(--text3);font-size:8px}
.home-clock{font-variant-numeric:tabular-nums;color:var(--accent);letter-spacing:0.04em}
/* today bar */
.home-today-bar{margin:16px 20px 0;background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:14px 16px;cursor:pointer;transition:all 0.2s}
.home-today-bar:active{transform:scale(0.99);background:var(--bg3)}
.home-today-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.home-today-label{font-size:12px;color:var(--text2);font-weight:500}
.home-today-count{font-size:12px;color:var(--accent);font-weight:600}
.home-today-track{height:3px;background:var(--border);border-radius:3px}
.home-today-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.home-today-sub{font-size:10px;color:var(--text3);margin-top:8px;letter-spacing:0.04em}
/* alerts */
.home-alerts{padding:12px 20px 0}
.alert-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.alert-card:active{transform:scale(0.98)}
.alert-icon{font-size:15px;flex-shrink:0}
.alert-text{flex:1}
.alert-title{font-size:12px;color:var(--text);font-weight:500}
.alert-sub{font-size:10px;color:var(--text3);margin-top:1px}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert-dot-empty{background:var(--red)}
.alert-dot-low{background:var(--yellow)}
/* section label */
.home-section-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);font-weight:700;padding:20px 20px 10px}
/* hub bottom bar */
.hub-bar{display:flex;justify-content:center;align-items:center;padding:14px 0 calc(14px + var(--safe-bot));border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.hub-home-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 28px;color:var(--accent);font-family:var(--sans)}
.hub-home-icon{font-size:20px;line-height:1}
.hub-home-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--accent)}
.home-grid{padding:0 16px 4px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.home-grid-locked{padding:0 16px 40px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.home-card{position:relative;background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;cursor:pointer;transition:all 0.2s;overflow:hidden}
.home-card:active{transform:scale(0.98);background:var(--bg3)}
.home-card.wide{grid-column:span 2;padding:16px 18px}
.home-card-inner{display:flex;align-items:center;gap:14px}
.home-card-icon{font-size:26px;flex-shrink:0}
.home-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.home-card-sub{font-size:11px;color:var(--text3);letter-spacing:0.01em}
.home-card.live{background:linear-gradient(145deg,rgba(200,184,154,0.09) 0%,var(--bg2) 55%);border-color:rgba(200,184,154,0.22)}
.home-card.live::after{content:'';position:absolute;top:16px;right:16px;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.home-card.locked{opacity:0.38;padding:14px 8px 12px;text-align:center;cursor:default}
.home-card.locked .home-card-icon{font-size:20px;display:block;margin-bottom:6px}
.home-card.locked .home-card-title{font-size:10px;color:var(--text3);font-weight:500;margin:0}
</style>
</head>
<body>
<div class="app">
  <div class="page">
    <div class="scroll">

      <div class="home-hero">
        <div class="home-sysbar">
          <div class="home-sys-id">Leo · OS</div>
          <div class="home-sys-status"><span class="sdot"></span>online</div>
        </div>
        <div class="home-greeting">good <span id="timeGreeting">morning</span></div>
        <div class="home-date" id="homeDate"></div>
        <div class="home-meta">
          <span id="homeDay"></span>
          <span class="home-meta-sep">◆</span>
          <span class="home-clock" id="homeClock">--:--</span>
        </div>
      </div>

      <!-- Today's routine progress -->
      <div class="home-today-bar" onclick="location.href='self-care/index.html'">
        <div class="home-today-top">
          <div class="home-today-label">Today's routine</div>
          <div class="home-today-count" id="homeTodayCount">—</div>
        </div>
        <div class="home-today-track">
          <div class="home-today-fill" id="homeTodayFill" style="width:0%"></div>
        </div>
        <div class="home-today-sub" id="homeTodaySub">Loading…</div>
      </div>

      <!-- Alerts -->
      <div id="homeAlerts"></div>

      <!-- Active pillars -->
      <div class="home-section-label">Active</div>
      <div class="home-grid">
        <div class="home-card live wide" onclick="location.href='self-care/index.html'">
          <div class="home-card-inner">
            <span class="home-card-icon">🪞</span>
            <div>
              <div class="home-card-title">Self Care</div>
              <div class="home-card-sub">AM · PM routine</div>
            </div>
          </div>
        </div>
        <div class="home-card live wide" onclick="location.href='self-care/kit.html'">
          <div class="home-card-inner">
            <span class="home-card-icon">🧴</span>
            <div>
              <div class="home-card-title">My Kit</div>
              <div class="home-card-sub">Products & tracking</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Locked pillars -->
      <div class="home-section-label">Coming soon</div>
      <div class="home-grid-locked">
        <div class="home-card locked">
          <div class="home-card-icon">🏋️</div>
          <div class="home-card-title">Fitness</div>
        </div>
        <div class="home-card locked">
          <div class="home-card-icon">🎵</div>
          <div class="home-card-title">Music</div>
        </div>
        <div class="home-card locked">
          <div class="home-card-icon">🎨</div>
          <div class="home-card-title">Creative</div>
        </div>
        <div class="home-card locked">
          <div class="home-card-icon">💻</div>
          <div class="home-card-title">Projects</div>
        </div>
      </div>

    </div>
  </div>
  <nav class="navbar">
    <button class="nav-btn" onclick="location.href='self-care/index.html'"><span class="nav-icon">🪞</span><span class="nav-label">Self Care</span></button>
    <button class="nav-btn" onclick="location.href='self-care/library.html'"><span class="nav-icon">◈</span><span class="nav-label">Library</span></button>
    <button class="nav-btn active" style="pointer-events:none"><span class="nav-icon">⌂</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="location.href='self-care/kit.html'"><span class="nav-icon">🧴</span><span class="nav-label">Kit</span></button>
    <button class="nav-btn" onclick="location.href='self-care/plan.html'"><span class="nav-icon">📋</span><span class="nav-label">Plan</span></button>
  </nav>
  <div class="toast" id="toast"></div>
</div>

<script src="js/core.js"></script>
<script>
// ── HOME INIT ─────────────────────────────────────────────────────────────────
(function() {
  const h = now.getHours();
  document.getElementById('timeGreeting').textContent = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('homeDate').textContent = MONTHS[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('homeDay').textContent = todayFull;
  startClock();
  loadTodayProgress();
  loadAlerts();
})();

let _clockTimer;
function startClock() {
  const tick = () => {
    const el = document.getElementById('homeClock');
    if (!el) return;
    const d = new Date();
    el.textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  };
  tick();
  _clockTimer = setInterval(tick, 10000);
}

async function loadTodayProgress() {
  const countEl = document.getElementById('homeTodayCount');
  const fillEl  = document.getElementById('homeTodayFill');
  const subEl   = document.getElementById('homeTodaySub');
  try {
    const schedules = await api('schedules', '?is_active=eq.true&limit=1');
    const sched = schedules?.[0];
    if (!sched) { subEl.textContent = 'No schedule set up yet'; countEl.textContent = ''; return; }
    const allSessions = await api('schedule_sessions', `?schedule_id=eq.${sched.id}&order=display_order.asc`);
    const d = new Date(), dow = d.getDay(), dom = d.getDate(), dateStr = getDateStr(d);
    const sessions = (allSessions || []).filter(s => {
      if (s.rule_type === 'daily')   return true;
      if (s.rule_type === 'weekly')  return (s.rule_days || []).includes(dow);
      if (s.rule_type === 'monthly') return dom === s.rule_day_of_month;
      if (s.rule_type === 'once')    return s.rule_date === dateStr;
      return false;
    });
    if (!sessions.length) { subEl.textContent = 'Free day — nothing scheduled'; countEl.textContent = ''; fillEl.style.width = '0%'; return; }
    let total = 0, done = 0, names = [];
    for (const session of sessions) {
      const items = await api('session_items', `?session_id=eq.${session.id}&order=order_index.asc`).catch(() => []);
      for (const item of items || []) {
        if (item.item_type === 'routine' && item.routine_id) {
          const rs = await api('routine_steps', `?routine_id=eq.${item.routine_id}&order=order_index.asc`).catch(() => []);
          (rs || []).forEach(s => names.push(s.step_name));
        } else if (item.item_type === 'step') { names.push(item.step_name); }
      }
      const log = await api('tracker_log', `?date=eq.${dateStr}&session_id=eq.${session.id}`).catch(() => []);
      const doneSet = new Set((log || []).filter(e => e.checked).map(e => e.step_name));
      done  += names.filter(n => doneSet.has(n)).length;
      total += names.length;
    }
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    countEl.textContent = total > 0 ? `${done}/${total}` : '';
    fillEl.style.width  = pct + '%';
    if (done >= total && total > 0) {
      fillEl.style.background = 'var(--green)';
      subEl.textContent = 'All done ✦';
    } else {
      subEl.textContent = sessions.map(s => `${s.icon || ''} ${s.name}`.trim()).join('  ·  ') || 'Tap to open routine';
    }
  } catch(e) {
    console.error('loadTodayProgress', e);
    subEl.textContent = 'Tap to open routine';
  }
}

async function loadAlerts() {
  const el = document.getElementById('homeAlerts');
  try {
    const data = await api('products', '?status=eq.Owned&order=name.asc');
    const alerts = [];
    (data || []).forEach(p => {
      if (p.stock === 'Empty') alerts.push({ type:'empty', icon:'🔴', title:p.name, sub:`${p.brand||''} · Out of stock` });
      else if (p.stock === 'Low') alerts.push({ type:'low', icon:'🟡', title:p.name, sub:`${p.brand||''} · Running low` });
    });
    if (!alerts.length) { el.innerHTML = ''; return; }
    el.innerHTML = '<div class="home-alerts">' + alerts.slice(0,4).map(a => `
      <div class="alert-card" onclick="location.href='self-care/library.html'">
        <span class="alert-icon">${a.icon}</span>
        <div class="alert-text">
          <div class="alert-title">${escHtml(a.title)}</div>
          <div class="alert-sub">${escHtml(a.sub)}</div>
        </div>
        <div class="alert-dot alert-dot-${a.type === 'empty' ? 'empty' : 'low'}"></div>
      </div>`).join('') + '</div>';
  } catch(e) { el.innerHTML = ''; }
}
</script>
</body>
</html>
