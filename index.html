<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LeoOS">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<title>LeoOS</title>
<style>
:root {
  --bg: #080808;
  --bg2: #111111;
  --bg3: #181818;
  --border: #1f1f1f;
  --border2: #2a2a2a;
  --text: #e8e6e0;
  --text2: #888880;
  --text3: #444440;
  --accent: #c8b89a;
  --accent2: #8a7a64;
  --green: #4a7c59;
  --yellow: #8a7a40;
  --red: #7a3a3a;
  --sans: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);overflow:hidden}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;padding-top:var(--safe-top)}
.screen.active{display:flex}

/* NAV */
.navbar{display:flex;justify-content:space-around;align-items:center;padding:10px 0 calc(10px + var(--safe-bot));border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 20px;color:var(--text3);transition:color 0.2s;font-family:var(--sans)}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

.page-header{padding:20px 20px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.page-label{font-size:10px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px}
.page-title{font-family:var(--serif);font-size:26px;color:var(--text)}
.page-subtitle{font-size:12px;color:var(--text2);margin-top:2px}

/* HOME */
.home-hero{padding:32px 20px 24px;border-bottom:0.5px solid var(--border)}
.home-greeting{font-size:12px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.home-date{font-family:var(--serif);font-size:32px;color:var(--text);line-height:1.1}
.home-day{font-size:13px;color:var(--text2);margin-top:4px}
.home-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.home-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:18px 16px;cursor:pointer;transition:all 0.2s}
.home-card:active{background:var(--bg3);transform:scale(0.98)}
.home-card-icon{font-size:24px;margin-bottom:12px}
.home-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.home-card-sub{font-size:11px;color:var(--text3)}
.home-card.wide{grid-column:span 2}

/* SESSION TOGGLE */
.session-toggle{display:flex;background:var(--bg2);border-radius:20px;padding:3px;margin:16px 20px;border:0.5px solid var(--border);flex-shrink:0}
.sess-btn{flex:1;padding:8px;border-radius:16px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text3);font-family:var(--sans)}
.sess-btn.active{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}

/* DATE NAV */
.date-nav{display:flex;align-items:center;padding:0 20px 14px;gap:12px;flex-shrink:0}
.date-arrow{background:none;border:0.5px solid var(--border);color:var(--text3);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;font-family:var(--sans)}
.date-arrow:active{background:var(--bg2);color:var(--text)}
.date-arrow:disabled{opacity:0.2;pointer-events:none}
.date-center{flex:1;text-align:center}
.date-nav-text{font-size:14px;color:var(--text);font-weight:500}
.date-nav-day{font-size:11px;color:var(--text3);margin-top:1px}

/* PAST LOG VIEW */
.past-log{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px}
.past-log::-webkit-scrollbar{display:none}
.past-header{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.past-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.past-item:last-child{border-bottom:none}
.past-status-icon{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.past-done-icon{background:var(--accent);color:var(--bg)}
.past-skip-icon{background:var(--bg3);color:var(--text3)}
.past-item-info{flex:1;min-width:0}
.past-item-name{font-size:13px;color:var(--text2)}
.past-item-product{font-size:11px;color:var(--text3);margin-top:2px}
.past-item.was-skipped .past-item-name{color:var(--text3);text-decoration:line-through}
.future-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border);opacity:0.5}
.future-item:last-child{border-bottom:none}
.future-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0}
.future-item-name{font-size:13px;color:var(--text3)}
.freq-badge-small{font-size:9px;padding:2px 5px;border-radius:6px;margin-left:6px}
.no-log{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;flex:1}
.no-log-glyph{font-family:var(--serif);font-size:36px;color:var(--text3);margin-bottom:12px;font-style:italic}
.no-log-text{font-size:13px;color:var(--text3)}

/* PROGRESS */
.progress-bar-wrap{padding:0 20px 12px;flex-shrink:0}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--text3)}
.progress-count{font-size:11px;color:var(--text2);font-weight:500}
.progress-track{height:2px;background:var(--border);border-radius:2px}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}

/* STEP LIST */
.step-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.step-list::-webkit-scrollbar{display:none}

.step-row{border-bottom:0.5px solid var(--border)}
.step-main{display:flex;align-items:center;padding:13px 20px;gap:13px;cursor:pointer;transition:background 0.15s}
.step-main:active{background:var(--bg2)}
.step-row.done .step-main{opacity:0.3}
.step-row.skipped .step-main{opacity:0.2}
.step-num{font-size:10px;color:var(--text3);width:16px;text-align:right;flex-shrink:0}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.step-row.done .check-circle{background:var(--accent);border-color:var(--accent)}
.checkmark{display:none;width:6px;height:9px;border:1.5px solid var(--bg);border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.step-row.done .checkmark{display:block}
.step-info{flex:1;min-width:0}
.step-name{font-size:14px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-row.done .step-name{text-decoration:line-through;color:var(--text3)}
.step-row.skipped .step-name{color:var(--text3)}
.step-note{font-size:10px;color:var(--text3);margin-top:2px}
.freq-badge{font-size:9px;padding:2px 6px;border-radius:8px;flex-shrink:0;font-weight:500}
.freq-weekly{background:#1a1a2e;color:#4a4a8a}
.freq-monthly{background:#2e1a1a;color:#8a4a4a}
.skip-btn{font-size:10px;color:var(--text3);border:0.5px solid var(--border);background:transparent;cursor:pointer;padding:3px 8px;border-radius:6px;flex-shrink:0;transition:all 0.15s;font-family:var(--sans)}
.step-row.skipped .skip-btn{color:var(--accent2);border-color:var(--accent2)}

/* PRODUCT PICKER — shows after check */
.product-picker{padding:10px 20px 14px 51px;border-top:0.5px solid var(--border);display:none;flex-direction:column;gap:8px}
.step-row.done .product-picker{display:flex}
.product-picker-label{font-size:11px;color:var(--text3)}
.product-chips{display:flex;flex-wrap:wrap;gap:6px}
.product-chip{padding:4px 10px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.product-chip.selected{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.no-products{font-size:11px;color:var(--text3);font-style:italic}

/* FOOTER */
.routine-footer{padding:12px 20px calc(12px + var(--safe-bot));border-top:0.5px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.skip-all-btn{flex:1;padding:13px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.save-btn{flex:1;padding:13px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.2s;opacity:0.35;pointer-events:none}
.save-btn.active{opacity:1;pointer-events:all}
.save-btn:active{transform:scale(0.98)}
.save-btn:disabled{opacity:0.4}

/* DONE OVERLAY */
.done-overlay{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center}
.done-glyph{font-family:var(--serif);font-size:64px;color:var(--accent);margin-bottom:20px;font-style:italic}
.done-title{font-family:var(--serif);font-size:24px;color:var(--text);margin-bottom:8px}
.done-sub{font-size:13px;color:var(--text3)}
.done-reset{margin-top:28px;padding:10px 24px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--sans)}

/* KIT */
.kit-filter{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;flex-shrink:0}
.kit-filter::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:16px;border:0.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.filter-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px 20px}
.product-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s}
.product-card:active{transform:scale(0.97)}
.product-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-img-placeholder{font-size:32px;color:var(--text3)}
.product-info{padding:10px 12px}
.product-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-brand{font-size:10px;color:var(--text3)}
.product-price{font-size:11px;color:var(--accent);margin-top:4px}
.stock-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.stock-full{background:var(--green)}
.stock-low{background:var(--yellow)}
.stock-empty{background:var(--red)}

/* EMPTY / LOADING */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;text-align:center;flex:1}
.empty-glyph{font-family:var(--serif);font-size:48px;color:var(--text3);margin-bottom:16px;font-style:italic}
.empty-title{font-size:15px;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.6}
.loading{display:flex;align-items:center;justify-content:center;flex:1}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);margin:0 3px;animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="scroll">
      <div class="home-hero">
        <div class="home-greeting">good <span id="timeGreeting">morning</span></div>
        <div class="home-date" id="homeDate"></div>
        <div class="home-day" id="homeDay"></div>
      </div>
      <div class="home-grid">
        <div class="home-card wide" onclick="navigate('selfcare')">
          <div class="home-card-icon">🪞</div>
          <div class="home-card-title">Self Care</div>
          <div class="home-card-sub">AM · PM routine</div>
        </div>
        <div class="home-card" onclick="navigate('kit')">
          <div class="home-card-icon">🧴</div>
          <div class="home-card-title">My Kit</div>
          <div class="home-card-sub">Products</div>
        </div>
        <div class="home-card" onclick="showToast('Coming soon')">
          <div class="home-card-icon">🏋️</div>
          <div class="home-card-title">Fitness</div>
          <div class="home-card-sub">Coming soon</div>
        </div>
        <div class="home-card" onclick="showToast('Coming soon')">
          <div class="home-card-icon">🎵</div>
          <div class="home-card-title">Music</div>
          <div class="home-card-sub">Coming soon</div>
        </div>
        <div class="home-card" onclick="showToast('Coming soon')">
          <div class="home-card-icon">🎨</div>
          <div class="home-card-title">Creative</div>
          <div class="home-card-sub">Coming soon</div>
        </div>
        <div class="home-card" onclick="showToast('Coming soon')">
          <div class="home-card-icon">💻</div>
          <div class="home-card-title">Projects</div>
          <div class="home-card-sub">Coming soon</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SELF CARE -->
  <div class="screen" id="screen-selfcare">
    <div class="page-header">
      <div class="page-label">Leo OS</div>
      <div class="page-title">Self Care</div>
    </div>
    <div class="session-toggle">
      <button class="sess-btn active" id="amBtn" onclick="setSession('Morning')">🌅 Morning</button>
      <button class="sess-btn" id="pmBtn" onclick="setSession('Evening')">🌙 Evening</button>
    </div>
    <div class="date-nav">
      <button class="date-arrow" onclick="shiftDay(-1)">&#8592;</button>
      <div class="date-center">
        <div class="date-nav-text" id="routineDateText"></div>
        <div class="date-nav-day" id="routineDayBadge"></div>
      </div>
      <button class="date-arrow" onclick="shiftDay(1)" id="nextDayBtn">&#8594;</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-label" id="progressLabel">morning routine</span>
        <span class="progress-count" id="progressCount">0 / 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="step-list" id="stepList">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
    <div class="done-overlay" id="doneOverlay">
      <div class="done-glyph">✦</div>
      <div class="done-title">All done.</div>
      <div class="done-sub" id="doneSub"></div>
      <button class="done-reset" onclick="resetRoutine()">reset</button>
    </div>
    <div class="routine-footer" id="routineFooter">
      <button class="skip-all-btn" onclick="skipAll()">Skip All</button>
      <button class="save-btn" id="saveBtn" onclick="saveRoutine()">Save Routine</button>
    </div>
  </div>

  <!-- KIT -->
  <div class="screen" id="screen-kit">
    <div class="page-header">
      <div class="page-label">Self Care</div>
      <div class="page-title">My Kit</div>
      <div class="page-subtitle" id="kitSubtitle">Loading...</div>
    </div>
    <div class="kit-filter" id="kitFilter"></div>
    <div class="scroll">
      <div class="kit-grid" id="kitGrid">
        <div style="grid-column:span 2" class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>
  </div>

  <!-- NAV: Self Care | Home | Kit -->
  <nav class="navbar">
    <button class="nav-btn" id="nav-selfcare" onclick="navigate('selfcare')">
      <span class="nav-icon">🪞</span>
      <span class="nav-label">Self Care</span>
    </button>
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nav-kit" onclick="navigate('kit')">
      <span class="nav-icon">🧴</span>
      <span class="nav-label">Kit</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dcchjwowwdkpdyxaopic.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjY2hqd293d2RrcGR5eGFvcGljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM0NzUsImV4cCI6MjA5NTgxOTQ3NX0.FxozE-chmtrJcsZSiu4WYwn-GsrqYOQzgDA0pqPQbGc';
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const now = new Date();
const todayIdx = now.getDay();
const todayShort = DAYS[todayIdx];
const todayFull = DAY_FULL[todayIdx];
const todayDate = now.toISOString().split('T')[0];
const dayOfMonth = now.getDate();

let viewDate = new Date(now); // the date currently being viewed
let isToday = true;
let isPast = false;

function getDateStr(d) { return d.toISOString().split('T')[0]; }
function getDayShort(d) { return DAYS[d.getDay()]; }
function getDayFull(d) { return DAY_FULL[d.getDay()]; }

function shiftDay(delta) {
  viewDate.setDate(viewDate.getDate() + delta);
  isToday = getDateStr(viewDate) === todayDate;
  isPast = viewDate < new Date(now.toDateString());
  stepState = {}; stepProducts = {};
  updateDateNav();
  if(isToday) {
    document.getElementById('routineFooter').style.display = 'flex';
    deactivateSave();
    loadSteps();
  } else if(isPast) {
    document.getElementById('routineFooter').style.display = 'none';
    loadPastLog();
  } else {
    document.getElementById('routineFooter').style.display = 'none';
    loadFuturePreview();
  }
}

function updateDateNav() {
  const d = viewDate;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isCurrentYear = d.getFullYear() === now.getFullYear();
  document.getElementById('routineDateText').textContent = 
    getDayFull(d) + ', ' + months[d.getMonth()] + ' ' + d.getDate() + (isCurrentYear ? '' : ' ' + d.getFullYear());
  document.getElementById('routineDayBadge').textContent = isToday ? 'Today' : isPast ? 'Past' : 'Upcoming';
  document.getElementById('nextDayBtn').disabled = false;
}

let currentSession = (now.getHours() >= 3 && now.getHours() < 15) ? 'Morning' : 'Evening';
let steps = [];
let stepState = {};
let stepProducts = {}; // id -> selected product id
let hasChanges = false;
let ownedProducts = [];
let kitFilter = 'All';
let products = [];

async function api(table, params='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}

async function apiPost(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
  return res.ok;
}

function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  document.getElementById(`nav-${screen}`)?.classList.add('active');
  if(screen==='selfcare') initSelfCare();
  if(screen==='kit') initKit();
}

// HOME
function initHome() {
  const h = now.getHours();
  document.getElementById('timeGreeting').textContent = h<12?'morning':h<17?'afternoon':'evening';
  document.getElementById('homeDate').textContent = MONTHS[now.getMonth()]+' '+now.getDate();
  document.getElementById('homeDay').textContent = todayFull;
}

// SELF CARE
async function initSelfCare() {
  viewDate = new Date(now); isToday = true; isPast = false;
  document.getElementById('amBtn').classList.toggle('active', currentSession==='Morning');
  document.getElementById('pmBtn').classList.toggle('active', currentSession==='Evening');
  document.getElementById('routineFooter').style.display = 'flex';
  updateDateNav();
  if(!ownedProducts.length) {
    const data = await api('products','?status=eq.Owned&order=name.asc');
    ownedProducts = data||[];
  }
  await loadSteps();
}

function setSession(s) {
  currentSession = s;
  document.getElementById('amBtn').classList.toggle('active',s==='Morning');
  document.getElementById('pmBtn').classList.toggle('active',s==='Evening');
  stepState={};stepProducts={};
  loadSteps();
}

async function loadSteps() {
  document.getElementById('doneOverlay').style.display='none';
  document.getElementById('stepList').style.display='block';
  document.getElementById('stepList').innerHTML='<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  const existingPast = document.getElementById('pastView');
  if(existingPast) existingPast.remove();

  // Fetch daily + weekly steps for today
  const vDay = getDayShort(viewDate);
  const vDayOfMonth = viewDate.getDate();
  const [daily, weekly, monthly] = await Promise.all([
    api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Daily&order=order.asc`),
    api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Weekly&days=cs.{"${vDay}"}&order=order.asc`),
    vDayOfMonth===1 ? api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Monthly&order=order.asc`) : Promise.resolve([])
  ]);

  // Merge and sort by order
  const all = [...(daily||[]), ...(weekly||[]), ...(monthly||[])];
  all.sort((a,b)=>a.order-b.order);
  steps = all;

  if(!steps.length) {
    document.getElementById('stepList').innerHTML='<div class="empty-state"><div class="empty-glyph">∅</div><div class="empty-title">No steps for today</div><div class="empty-sub">Enjoy your day off</div></div>';
    return;
  }

  steps.forEach(s=>{if(!stepState[s.id])stepState[s.id]='pending';});
  renderSteps();
}

function renderSteps() {
  const total=steps.length;
  const done=steps.filter(s=>stepState[s.id]==='done').length;
  const skipped=steps.filter(s=>stepState[s.id]==='skipped').length;
  const pct=Math.round((done/total)*100);

  document.getElementById('progressLabel').textContent=currentSession==='Morning'?'morning routine':'evening routine';
  document.getElementById('progressCount').textContent=`${done} / ${total}`;
  document.getElementById('progressFill').style.width=pct+'%';

  if(done+skipped===total&&total>0){
    document.getElementById('stepList').style.display='none';
    const o=document.getElementById('doneOverlay');
    o.style.display='flex';o.style.flexDirection='column';
    document.getElementById('doneSub').textContent=`${done} done · ${skipped} skipped`;
    return;
  }

  document.getElementById('doneOverlay').style.display='none';
  document.getElementById('stepList').style.display='block';

  document.getElementById('stepList').innerHTML=steps.map((s,i)=>{
    const st=stepState[s.id];
    const isDone=st==='done';
    const isSkipped=st==='skipped';
    const freqBadge=s.frequency==='Weekly'?'<span class="freq-badge freq-weekly">weekly</span>':s.frequency==='Monthly'?'<span class="freq-badge freq-monthly">monthly</span>':'';
    const note=s.insertion_note?`<div class="step-note">${s.insertion_note}</div>`:'';

    // Product picker — only show when done
    const pickerHtml=buildProductPicker(s.id, isDone);

    return `<div class="step-row${isDone?' done':isSkipped?' skipped':''}" id="row-${s.id}">
      <div class="step-main" onclick="toggleStep('${s.id}')">
        <span class="step-num">${i+1}</span>
        <div class="check-circle"><div class="checkmark"></div></div>
        <div class="step-info">
          <div class="step-name">${s.name}</div>
          ${note}
        </div>
        ${freqBadge}
        <button class="skip-btn" onclick="event.stopPropagation();toggleSkip('${s.id}')">${isSkipped?'undo':'skip'}</button>
      </div>
      ${pickerHtml}
    </div>`;
  }).join('');
}

function buildProductPicker(stepId, show) {
  if(!show) return `<div class="product-picker" id="picker-${stepId}"></div>`;
  const selected=stepProducts[stepId]||null;
  if(!ownedProducts.length) return `<div class="product-picker" id="picker-${stepId}"><span class="no-products">No products in kit yet</span></div>`;
  const chips=ownedProducts.map(p=>`<button class="product-chip${selected===p.id?' selected':''}" onclick="selectProduct('${stepId}','${p.id}')">${p.name}</button>`).join('');
  return `<div class="product-picker" id="picker-${stepId}">
    <div class="product-picker-label">Which product did you use?</div>
    <div class="product-chips">${chips}</div>
  </div>`;
}

function selectProduct(stepId, productId) {
  stepProducts[stepId]=stepProducts[stepId]===productId?null:productId;
  activateSave();
  const picker=document.getElementById(`picker-${stepId}`);
  if(picker) picker.outerHTML=buildProductPicker(stepId,true);
}

function toggleStep(id) {
  stepState[id]=stepState[id]==='done'?'pending':'done';
  if(stepState[id]==='pending') delete stepProducts[id];
  activateSave();
  renderSteps();
}

function toggleSkip(id) {
  stepState[id]=stepState[id]==='skipped'?'pending':'skipped';
  activateSave();
  renderSteps();
}

function skipAll() {
  steps.forEach(s=>stepState[s.id]='skipped');
  activateSave();
  renderSteps();
}

function resetRoutine() {
  steps.forEach(s=>{stepState[s.id]='pending';delete stepProducts[s.id];});
  document.getElementById('stepList').style.display='block';
  document.getElementById('doneOverlay').style.display='none';
  renderSteps();
}

async function loadPastLog() {
  const dateStr = getDateStr(viewDate);
  const vDay = getDayShort(viewDate);
  const vDayOfMonth = viewDate.getDate();

  // Get what was logged
  const logged = await api('daily_log', `?date=eq.${dateStr}&time_of_day=eq.${currentSession}&order=order.asc`);

  // Show step list area as past view
  document.getElementById('doneOverlay').style.display = 'none';
  document.getElementById('stepList').style.display = 'none';

  // Remove old past view if exists
  const existing = document.getElementById('pastView');
  if(existing) existing.remove();

  const container = document.createElement('div');
  container.id = 'pastView';
  container.className = 'past-log';

  if(!logged || !logged.length) {
    container.innerHTML = `<div class="no-log"><div class="no-log-glyph">∅</div><div class="no-log-text">Nothing was logged<br>on this day</div></div>`;
  } else {
    // Get product names for logged entries
    const productIds = logged.map(l=>l.product_used).filter(Boolean);
    let productMap = {};
    if(productIds.length) {
      const prods = await api('products', `?id=in.(${productIds.join(',')})&select=id,name`);
      (prods||[]).forEach(p => productMap[p.id] = p.name);
    }

    const doneItems = logged.filter(l=>l.status==='Done');
    const skippedItems = logged.filter(l=>l.status==='Skipped');

    let html = '';
    if(doneItems.length) {
      html += `<div class="past-header">✓ Completed · ${doneItems.length}</div>`;
      html += doneItems.map(l => `
        <div class="past-item">
          <div class="past-status-icon past-done-icon">✓</div>
          <div class="past-item-info">
            <div class="past-item-name">${l.step_name}</div>
            ${l.product_used && productMap[l.product_used] ? `<div class="past-item-product">${productMap[l.product_used]}</div>` : ''}
          </div>
        </div>`).join('');
    }
    if(skippedItems.length) {
      html += `<div class="past-header" style="margin-top:${doneItems.length?'20px':'0'}">Skipped · ${skippedItems.length}</div>`;
      html += skippedItems.map(l => `
        <div class="past-item was-skipped">
          <div class="past-status-icon past-skip-icon">—</div>
          <div class="past-item-info">
            <div class="past-item-name">${l.step_name}</div>
          </div>
        </div>`).join('');
    }
    container.innerHTML = html;
  }

  document.getElementById('stepList').insertAdjacentElement('afterend', container);
}

async function loadFuturePreview() {
  const vDay = getDayShort(viewDate);
  const vDayOfMonth = viewDate.getDate();

  const [daily, weekly, monthly] = await Promise.all([
    api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Daily&order=order.asc`),
    api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Weekly&days=cs.{"${vDay}"}&order=order.asc`),
    vDayOfMonth===1 ? api('routine_tasks',`?time_of_day=eq.${currentSession}&frequency=eq.Monthly&order=order.asc`) : Promise.resolve([])
  ]);

  const all = [...(daily||[]),...(weekly||[]),...(monthly||[])];
  all.sort((a,b)=>a.order-b.order);

  document.getElementById('doneOverlay').style.display='none';
  document.getElementById('stepList').style.display='none';
  const existing = document.getElementById('pastView');
  if(existing) existing.remove();

  const container = document.createElement('div');
  container.id = 'pastView';
  container.className = 'past-log';

  container.innerHTML = `<div class="past-header">Upcoming · ${all.length} steps</div>` +
    all.map((s,i) => `
      <div class="future-item">
        <div class="future-dot"></div>
        <div class="future-item-name">${i+1}. ${s.name}
          ${s.frequency==='Weekly'?'<span class="freq-badge-small freq-weekly">weekly</span>':s.frequency==='Monthly'?'<span class="freq-badge-small freq-monthly">monthly</span>':''}
        </div>
      </div>`).join('');

  document.getElementById('stepList').insertAdjacentElement('afterend', container);
}

async function saveRoutine() {
  if(!hasChanges) return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Saving...';

  const entries=steps
    .filter(s=>stepState[s.id]!=='pending')
    .map(s=>({
      date:saveDateStr,
      step_name:s.name,
      time_of_day:currentSession,
      status:stepState[s.id]==='done'?'Done':'Skipped',
      order:s.order,
      product_used:stepProducts[s.id]||null
    }));

  if(!entries.length){showToast('Nothing to save yet');btn.disabled=false;btn.classList.remove('active');return;}

  // Delete existing entries for today + this session first
  const saveDateStr = getDateStr(viewDate);
  await fetch(`${SUPABASE_URL}/rest/v1/daily_log?date=eq.${saveDateStr}&time_of_day=eq.${currentSession}`, {
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });

  const ok=await apiPost('daily_log',entries);
  btn.disabled=false;
  btn.textContent='Save Routine';
  if(ok){
    deactivateSave();
    showToast(`✓ ${entries.length} steps logged`);
  } else {
    btn.classList.add('active');
    showToast('Something went wrong');
  }
}

// KIT
async function initKit() {
  const data=await api('products','?status=eq.Owned&order=category.asc,name.asc');
  products=data||[];
  const cats=['All',...new Set(products.map(p=>p.category).filter(Boolean))];
  document.getElementById('kitFilter').innerHTML=cats.map(c=>`<button class="filter-btn${c===kitFilter?' active':''}" onclick="setKitFilter('${c}')">${c}</button>`).join('');
  document.getElementById('kitSubtitle').textContent=`${products.length} products owned`;
  renderKit();
}

function setKitFilter(cat) {
  kitFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  renderKit();
}

function renderKit() {
  const filtered=kitFilter==='All'?products:products.filter(p=>p.category===kitFilter);
  if(!filtered.length){
    document.getElementById('kitGrid').innerHTML=`<div style="grid-column:span 2"><div class="empty-state"><div class="empty-glyph">∅</div><div class="empty-title">No products here</div><div class="empty-sub">Add products to your kit</div></div></div>`;
    return;
  }
  document.getElementById('kitGrid').innerHTML=filtered.map(p=>`
    <div class="product-card">
      <div class="product-img">${p.image_url?`<img src="${p.image_url}" alt="${p.name}">`:`<div class="product-img-placeholder">🧴</div>`}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-brand">${p.brand||''}</div>
        ${p.price?`<div class="product-price">€${Number(p.price).toFixed(2)}</div>`:''}
        <div style="margin-top:4px"><span class="stock-dot stock-${(p.stock||'Full').toLowerCase()}"></span><span style="font-size:10px;color:var(--text3)">${p.stock||'Full'}</span></div>
      </div>
    </div>`).join('');
}

// SAVE STATE
function activateSave() {
  hasChanges = true;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('active');
}

function deactivateSave() {
  hasChanges = false;
  const btn = document.getElementById('saveBtn');
  btn.classList.remove('active');
}

// TOAST
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

initHome();
</script>
